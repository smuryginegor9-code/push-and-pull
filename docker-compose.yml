version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pushme-db
    environment:
      POSTGRES_DB: pushme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pushme_db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: pushme-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pushme
      JWT_SECRET: change_this_to_long_random_secret
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FRONTEND_ORIGIN: https://esmurygin.ru,http://localhost:5173,http://localhost
      AUTH_MAX_AGE_SECONDS: 86400
    depends_on:
      - db
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://esmurygin.ru/api
    container_name: pushme-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pushme_db_data:
