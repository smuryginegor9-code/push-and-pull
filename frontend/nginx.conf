server {
  listen 80;
  server_name _;

  etag off;
  if_modified_since off;

  root /usr/share/nginx/html;
  index index.html;

  location = /assets/index.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  location = /assets/index.css {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  # Compatibility for Telegram cached HTML that still points to old hashed entry assets.
  location ~* ^/assets/index-[A-Za-z0-9_-]+\.js$ {
    try_files /assets/index.js =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  location ~* ^/assets/index-[A-Za-z0-9_-]+\.css$ {
    try_files /assets/index.css =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
  }

  location = /telegram-web-app.js {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=86400" always;
  }

  location = /index.html {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }
}
